plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.haywan.filtercam'
version = '1.0.0'

android {
  namespace 'com.haywan.filtercam.beautyfilter'
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
  androidResources {
    // The MediaPipe model must stay uncompressed so it can be memory-mapped.
    noCompress 'task'
  }
}

// The React Native Gradle plugin pulls in full Guava, which forces
// listenablefuture to the empty 9999.0 jar; CameraX needs the real class.
configurations.configureEach {
  resolutionStrategy.force 'com.google.guava:listenablefuture:1.0'
}

dependencies {
  def camerax_version = '1.6.0'
  implementation "androidx.camera:camera-core:${camerax_version}"
  implementation "androidx.camera:camera-camera2:${camerax_version}"
  implementation "androidx.camera:camera-lifecycle:${camerax_version}"
  implementation 'androidx.core:core-ktx:1.18.0'

  implementation 'com.google.mediapipe:tasks-vision:0.10.26.1'
}
